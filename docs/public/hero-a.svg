<svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grainGrad" x1="160" y1="60" x2="160" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="160" y1="0" x2="160" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Precision lines radiating from center -->
  <line x1="160" y1="160" x2="160" y2="20" stroke="url(#lineGrad)" stroke-width="1" opacity="0.3"/>
  <line x1="160" y1="160" x2="259" y2="61" stroke="url(#lineGrad)" stroke-width="1" opacity="0.3"/>
  <line x1="160" y1="160" x2="300" y2="160" stroke="url(#lineGrad)" stroke-width="1" opacity="0.3"/>
  <line x1="160" y1="160" x2="259" y2="259" stroke="url(#lineGrad)" stroke-width="1" opacity="0.3"/>
  <line x1="160" y1="160" x2="160" y2="300" stroke="url(#lineGrad)" stroke-width="1" opacity="0.3"/>
  <line x1="160" y1="160" x2="61" y2="259" stroke="url(#lineGrad)" stroke-width="1" opacity="0.3"/>
  <line x1="160" y1="160" x2="20" y2="160" stroke="url(#lineGrad)" stroke-width="1" opacity="0.3"/>
  <line x1="160" y1="160" x2="61" y2="61" stroke="url(#lineGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Concentric rings -->
  <circle cx="160" cy="160" r="120" stroke="#F59E0B" stroke-width="0.5" fill="none" opacity="0.15"/>
  <circle cx="160" cy="160" r="90" stroke="#F59E0B" stroke-width="0.5" fill="none" opacity="0.2"/>

  <!-- Small precision dots on rings -->
  <circle cx="160" cy="40" r="2.5" fill="#F59E0B" opacity="0.4"/>
  <circle cx="280" cy="160" r="2.5" fill="#F59E0B" opacity="0.4"/>
  <circle cx="160" cy="280" r="2.5" fill="#F59E0B" opacity="0.4"/>
  <circle cx="40" cy="160" r="2.5" fill="#F59E0B" opacity="0.4"/>

  <!-- Core grain shape — minimal seed/diamond -->
  <path d="M 160 90 C 200 120, 210 170, 160 240 C 110 170, 120 120, 160 90 Z" fill="url(#grainGrad)"/>

  <!-- Inner highlight -->
  <path d="M 160 105 C 188 128, 195 165, 160 220 C 125 165, 132 128, 160 105 Z" fill="white" opacity="0.12"/>

  <!-- Center line detail -->
  <line x1="160" y1="100" x2="160" y2="230" stroke="white" stroke-width="0.8" opacity="0.2"/>
</svg>
