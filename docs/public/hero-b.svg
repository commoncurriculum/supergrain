<svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="kernelGradB" x1="160" y1="80" x2="160" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="40%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="capeGradB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <filter id="powerGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ringGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer power rings -->
  <circle cx="160" cy="165" r="130" stroke="#F59E0B" stroke-width="1" fill="none" opacity="0.1" filter="url(#ringGlow)"/>
  <circle cx="160" cy="165" r="110" stroke="#F59E0B" stroke-width="1.5" fill="none" opacity="0.15" filter="url(#ringGlow)"/>
  <circle cx="160" cy="165" r="90" stroke="#FDE68A" stroke-width="1" fill="none" opacity="0.1"/>

  <!-- Energy burst lines -->
  <line x1="160" y1="165" x2="160" y2="25" stroke="#FDE68A" stroke-width="1.5" opacity="0.2"/>
  <line x1="160" y1="165" x2="50" y2="85" stroke="#FDE68A" stroke-width="1.5" opacity="0.15"/>
  <line x1="160" y1="165" x2="270" y2="85" stroke="#FDE68A" stroke-width="1.5" opacity="0.15"/>
  <line x1="160" y1="165" x2="40" y2="200" stroke="#FDE68A" stroke-width="1" opacity="0.1"/>
  <line x1="160" y1="165" x2="280" y2="200" stroke="#FDE68A" stroke-width="1" opacity="0.1"/>
  <line x1="160" y1="165" x2="90" y2="290" stroke="#FDE68A" stroke-width="1" opacity="0.08"/>
  <line x1="160" y1="165" x2="230" y2="290" stroke="#FDE68A" stroke-width="1" opacity="0.08"/>

  <!-- Cape flowing behind -->
  <path d="M 140 140 Q 100 180, 80 250 Q 85 260, 95 255 Q 110 200, 140 165 Z" fill="url(#capeGradB)" opacity="0.85"/>
  <path d="M 180 140 Q 220 180, 240 250 Q 235 260, 225 255 Q 210 200, 180 165 Z" fill="url(#capeGradB)" opacity="0.85"/>

  <!-- Main grain kernel body — large, heroic -->
  <path d="M 160 80 C 205 115, 215 180, 160 260 C 105 180, 115 115, 160 80 Z" fill="url(#kernelGradB)" filter="url(#powerGlow)"/>

  <!-- Kernel crease line -->
  <line x1="160" y1="92" x2="160" y2="248" stroke="#B45309" stroke-width="1.5" opacity="0.3"/>

  <!-- Kernel texture curves -->
  <path d="M 145 110 Q 155 170, 150 230" stroke="#D97706" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M 175 110 Q 165 170, 170 230" stroke="#D97706" stroke-width="0.8" fill="none" opacity="0.3"/>

  <!-- Shine highlight -->
  <path d="M 155 95 C 140 120, 138 160, 148 200 C 142 160, 143 125, 155 95 Z" fill="white" opacity="0.2"/>

  <!-- Bold eyes -->
  <ellipse cx="147" cy="155" rx="6" ry="7" fill="#1E293B"/>
  <ellipse cx="173" cy="155" rx="6" ry="7" fill="#1E293B"/>
  <circle cx="149" cy="153" r="2.5" fill="white" opacity="0.7"/>
  <circle cx="175" cy="153" r="2.5" fill="white" opacity="0.7"/>

  <!-- Confident smirk -->
  <path d="M 148 175 Q 160 185, 172 175" stroke="#92400E" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Speed lines (flying) -->
  <line x1="60" y1="140" x2="30" y2="145" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="55" y1="160" x2="20" y2="168" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="60" y1="180" x2="35" y2="188" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="260" y1="140" x2="290" y2="145" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="265" y1="160" x2="300" y2="168" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="260" y1="180" x2="285" y2="188" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Sparkle particles -->
  <circle cx="95" cy="100" r="2" fill="#FDE68A" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="225" cy="95" r="2.5" fill="#FDE68A" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="210" r="1.5" fill="#FDE68A" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="240" cy="220" r="2" fill="#FDE68A" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.8s" repeatCount="indefinite"/>
  </circle>
</svg>
