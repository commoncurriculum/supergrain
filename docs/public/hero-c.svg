<svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="320" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E1B2E"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <clipPath id="roundRect">
      <rect x="30" y="30" width="260" height="260" rx="20"/>
    </clipPath>
  </defs>

  <!-- Terminal window background -->
  <rect x="30" y="30" width="260" height="260" rx="20" fill="url(#bgGrad)"/>
  <rect x="30" y="30" width="260" height="260" rx="20" stroke="#334155" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="30" y="30" width="260" height="32" rx="20" fill="#1E293B" clip-path="url(#roundRect)"/>
  <rect x="30" y="46" width="260" height="16" fill="#1E293B"/>
  <line x1="30" y1="62" x2="290" y2="62" stroke="#334155" stroke-width="0.5"/>

  <!-- Window dots -->
  <circle cx="52" cy="46" r="5" fill="#EF4444" opacity="0.8"/>
  <circle cx="70" cy="46" r="5" fill="#F59E0B" opacity="0.8"/>
  <circle cx="88" cy="46" r="5" fill="#22C55E" opacity="0.8"/>

  <!-- Code lines -->
  <!-- Line 1: const store = grain({ -->
  <text x="50" y="88" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#C084FC" font-weight="500">const</text>
  <text x="90" y="88" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#E2E8F0">store</text>
  <text x="126" y="88" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#64748B">=</text>
  <text x="138" y="88" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#F59E0B">grain</text>
  <text x="172" y="88" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#64748B">({</text>

  <!-- Line 2:   count: 0, -->
  <text x="62" y="106" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#7DD3FC">count</text>
  <text x="97" y="106" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#64748B">:</text>
  <text x="106" y="106" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#FDE68A">0</text>
  <text x="114" y="106" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#64748B">,</text>

  <!-- Line 3:   name: "supergrain" -->
  <text x="62" y="124" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#7DD3FC">name</text>
  <text x="93" y="124" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#64748B">:</text>
  <text x="102" y="124" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#86EFAC">"supergrain"</text>

  <!-- Line 4: }) -->
  <text x="50" y="142" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#64748B">})</text>

  <!-- Blank line -->

  <!-- Line 5: update(store, { -->
  <text x="50" y="172" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#F59E0B">update</text>
  <text x="90" y="172" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#64748B">(store, {</text>

  <!-- Line 6:   $inc: { count: 1 } -->
  <text x="62" y="190" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#C084FC">$inc</text>
  <text x="88" y="190" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#64748B">: {</text>
  <text x="110" y="190" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#7DD3FC">count</text>
  <text x="145" y="190" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#64748B">:</text>
  <text x="154" y="190" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#FDE68A">1</text>
  <text x="163" y="190" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#64748B">}</text>

  <!-- Line 7: }) -->
  <text x="50" y="208" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" fill="#64748B">})</text>

  <!-- Blinking cursor -->
  <rect x="66" y="218" width="7" height="14" fill="#F59E0B" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtle gradient bar at bottom -->
  <rect x="50" y="264" width="220" height="2" rx="1" fill="url(#barGrad)" opacity="0.6"/>
</svg>
