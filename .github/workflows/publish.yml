name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history so create-github-releases.mjs can resolve the commit
          # that introduced each published version for the Release's tag.
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.3

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      # pnpm 10.x delegates `pnpm publish` to the npm CLI. npm trusted
      # publishing (OIDC) requires npm >= 11.5.1, so make sure the npm on PATH
      # is recent enough regardless of what Node 24 happens to bundle.
      - name: Ensure npm supports trusted publishing (OIDC)
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        # Build every published package so each has a fresh dist/ before publish
        # (dist is gitignored). The root `build` script is the single source of
        # truth for "what gets published": kernel, mill, silo, husk, queries.
        run: pnpm run build

      - name: Create Release Pull Request or Publish to NPM
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          title: "Release: Version Packages"
          commit: "Release: Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN: authentication uses npm trusted publishing (OIDC).
          # The job's `id-token: write` permission lets npm mint a short-lived,
          # repo-scoped credential, so no long-lived token is needed. Every
          # published @supergrain package (kernel, mill, silo, husk, queries,
          # devtools) must have a Trusted Publisher configured at npmjs.com
          # pointing at commoncurriculum/supergrain + publish.yml.
          # Provenance attestations are generated automatically on OIDC
          # publishes; set it explicitly so intent is clear and verifiable.
          NPM_CONFIG_PROVENANCE: "true"

      # Rename the "Release: Version Packages" PR to the version it releases, so
      # the squash-merge commit on main reads e.g. "7.1.0 (#127)" instead of a
      # generic title. The action's `title`/`commit` inputs are evaluated before
      # `changeset version` runs, so the version isn't known yet there — we set
      # it here after the bump. All @supergrain/* share one version (fixed
      # group), so read it from any grouped package. Runs only on the version-PR
      # path (pending changesets), not the publish path.
      - name: Name the Release PR after its version
        if: steps.changesets.outputs.hasChangesets == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./packages/kernel/package.json').version")
          PR=$(gh pr list --head changeset-release/main --state open --json number --jq '.[0].number')
          if [ -n "$PR" ]; then
            gh pr edit "$PR" --title "$VERSION"
            echo "Renamed release PR #$PR to $VERSION"
          else
            echo "No open release PR found for changeset-release/main"
          fi

      # `pnpm -r publish` (required for correct `workspace:*` rewriting) does not
      # emit the `New tag:` output that changesets/action parses, so the action
      # never creates GitHub Releases. Create them here instead: for every
      # @supergrain package whose current version is live on npm and has no
      # Release yet, tag the commit and publish release notes from its CHANGELOG.
      # Idempotent, so it also backfills releases for previously-published
      # versions. Runs only on the publish path (no pending changesets).
      - name: Create GitHub Releases for published packages
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/create-github-releases.mjs
